# ==========================================
# DC Manga Downloader
# ==========================================

# --- 1. CORE SETTINGS ---
# The board URL to scan (Recommendation Board)
BoardUrl: "https://gall.dcinside.com/board/lists/?id=comic_new6&exception_mode=recommend"

# Set to False to crawl all posts, ignoring the "번역" (Translation) prefix. 
# Useful for boards with dedicated translation categories (e.g., search_head=10).
RequireTranslationPrefix: "True"

# Set to True to bypass the download history check.
# Smart Update: It will only download new/missing images if the folder exists, 
# or redownload entirely if you manually deleted the folder.
ForceRedownload: "True"


# --- 2. CRAWLER & SEARCH LIMITS ---
# Pages scanned by the Auto-Crawler (Run-Crawler.ps1)
# Keep this low (1-3) for regular scheduled background use.
AutoCrawlerMaxPages: 1

# Pages scanned by the Board Series Scanner (Search-Scanner.ps1, option 3)
# Each page is fully visited to check for [시리즈] blocks.
SeriesBrowserMaxPages: 1

# Max time-blocks searched by the Keyword Deep-Search (Search-Scanner.ps1, option 1)
# 300 = exhaustive full history search. Lower this (e.g. 10) 
# for faster targeted searches.
KeywordSearchMaxBlocks: 10

# Crawl Direction: 0 = Oldest First (Page 3 -> 1), 1 = Newest First (Page 1 -> 3)
CrawlOrder: 0

# If True, the auto-crawler appends to the list instead of wiping it fresh.
KeepUnfinishedLinks: False

# Pipe-separated list (|) of junk series titles to ignore (triggers chapter-name parsing fallback)
JunkSeriesTitles: "ㅇㅇ|1|UNKNOWN|.|잽랜드|단편|모음|단편 모음|타아모|이전화|타조 스나이퍼|1 :|지난 화 모음|목차|북마크|링크|북마크 찐빠있으면 말해줘 그럼 수정함|갓갓 갓갓갓|(내가 번역한 건 아니지만)|번역 기다리면서 볼 만화|번역 기다리는 동안 볼 만화|유동 번역 백업|없는 화는 그 사이트로|ETC"

# If True, dynamically hunts for older chapters missing from the current series block
DaisyChainSeries: True


# --- 3. DOWNLOADER ENGINE ---
# Folder where images will be saved (relative .\ or absolute path)
DownloadDir: ".\downloads"

# Max images to download at the same time.
MaxConcurrentDownloads: 15

# Delay between processing each Manga Post (in seconds) to avoid IP blocks
RateLimitSeconds: 2.5

# Set to True to rename images sequentially (001.jpg, 002.jpg, etc.)
RenameFilesSequential: True

# Extra characters to strip from folder names (e.g., "$@")
CustomStripChars: ""

# Set to False to hide the native PowerShell download bar for a cleaner console
ShowProgressBar: True


# --- 4. NETWORK & CONNECTION ---
# Set to True to allow the script to flush DNS and wait 10s on "No such host" errors
DNSAutoRepair: True

# Set to False to bypass system proxies (recommended for direct connection speed)
UseProxy: False


# --- 5. DATA & TRACKING PATHS ---
# Custom paths for tracking files (relative .\ or absolute path)
DownloadListPath: ".\Data\download_list.txt"
CatalogCsvPath: ".\Data\series_catalog.csv"


# --- 6. LOGGING SYSTEM ---
# Logging detail levels: "Verbose", "Info", "Warn", "Error"

# Downloader Logs
LogPath: ".\logs\Start-Downloader\download_logs.json"
LogLevel: "Verbose"

# Auto-Crawler Logs
AutoCrawlerLogPath: ".\logs\Run-Crawler\autocrawl_logs.json"

# Search-Scanner Logs
CrawlerLogDir: ".\logs"
CrawlerLogLevel: "Verbose"

# Log Rotation Limits (Additive)
CrawlerLogMaxMB: 10
CrawlerLogMaxFiles: 5

# --- 7. SCHEDULER SETTINGS ---
# Intervals (in hours) for the background scheduler (Start-Scheduler.ps1)
AutoCrawlerIntervalHours: 1
BoardCrawlerIntervalHours: 12

# --- 8. EXTERNAL LINKS FILTERING ---
# Domains to actively scan for and trigger the external downloader module (pipe-separated)
ExternalWhitelist: "telegra.ph | kone.gg"

# Domains to completely ignore and exclude from external_links.txt (pipe-separated)
ExternalBlacklist: "youtube.com | youtu.be | twitter.com | x.com"

# --- 9. ADVANCED / SYSTEM ---
# Set to True to force the use of powershell.exe (v5.1) even if pwsh (v7+) is installed.
ForceLegacyMode: False