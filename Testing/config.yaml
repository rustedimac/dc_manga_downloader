# ==========================================
# DC Manga Downloader Suite - Definitive Config
# ==========================================

# --- Target Settings ---
# The board URL to scan (Recommendation Board)
BoardUrl: "https://gall.dcinside.com/board/lists/?id=comic_new6&exception_mode=recommend"

# Number of pages to look back
MaxPages: 10

# Crawl Direction: 0 = Oldest First, 1 = Newest First
CrawlOrder: 0

# Append unfinished links instead of wiping
KeepUnfinishedLinks: False

# --- Network Settings ---
DNSAutoRepair: True
UseProxy: False
RateLimitSeconds: 2.5
MaxConcurrentDownloads: 3

# --- Downloader Settings ---
DownloadDir: ".\Downloads"
LogPath: ".\activity_log.json"
LogLevel: "Verbose"
ShowProgressBar: False
RenameFilesSequential: True
CustomStripChars: ""

# --- Google Custom Search Engine (optional) ---
GoogleCseApiKey: ""
GoogleCseCxId: ""

# --- Crawler Log Settings ---
# Folder for Search-Crawler JSON logs (separate from downloader's activity_log.json)
CrawlerLogDir: ".\logs"

# Crawler log detail: "Verbose" logs everything, "Error" logs only failures
CrawlerLogLevel: "Verbose"

# --- Debug & Compatibility ---
ForceLegacyMode: False
